<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="search-panel">
    <input id="search-input" type="text" placeholder="Search for an artist…" autocomplete="off" spellcheck="false">
    <ul id="search-results" hidden></ul>
  </div>

  <div id="graph"></div>

  <div id="detail-panel" hidden>
    <div id="detail-name"></div>
    <div id="detail-listeners"></div>
    <div id="detail-tags"></div>
    <div id="detail-bio"></div>
    <a id="detail-link" target="_blank" rel="noopener">View on Last.fm</a>
  </div>

  <div id="loading" hidden>Loading…</div>

  <script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
