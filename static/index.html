<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Explorer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="search-panel">
    <div id="search-landing">
      <div id="search-app-name">Rex Explorer</div>
    </div>
    <div id="search-input-wrap">
      <input id="search-input" type="text" placeholder="Search for an artist…" autocomplete="off" spellcheck="false">
      <button id="search-clear" aria-label="Clear search">×</button>
      <ul id="search-results" hidden></ul>
    </div>
    <div id="search-tagline">Explore the world around any artist</div>
    <div id="search-error" hidden>No results for that artist — try another name</div>
  </div>

  <div id="bg-graph"></div>
  <div id="graph"></div>

  <div id="detail-panel" hidden>
    <button id="detail-close" aria-label="Close">×</button>
    <div id="detail-hero">
      <img id="detail-img" alt="" hidden>
      <div id="detail-hero-bg"></div>
      <div id="detail-hero-text">
        <div id="detail-hero-text-left">
          <div id="detail-name"></div>
          <div id="detail-listeners"></div>
        </div>
        <button id="detail-center">⌖</button>
      </div>
    </div>
    <div id="detail-tags-row">
      <div id="detail-tags"></div>
    </div>
    <div id="detail-body">
      <div id="detail-body-inner">
        <div id="detail-bio"></div>
        <a id="detail-link" target="_blank" rel="noopener">View on Last.fm →</a>
      </div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-zoom-in"  data-tooltip="Zoom in">+</button>
    <button id="btn-zoom-out" data-tooltip="Zoom out">−</button>
    <button id="btn-center"   data-tooltip="Center on root artist">⌖</button>
  </div>

  <div id="loading" hidden>Loading…</div>

  <script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
